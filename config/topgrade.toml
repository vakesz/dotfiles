[misc]
# Disable built-in shell step (uses custom zinit command instead)
# Disable containers, yarn, deno steps
disable = ["shell", "containers", "yarn", "deno"]
display_time = true
cleanup = true
skip_notify = true

[commands]
"zinit" = "zsh -c 'source \"${XDG_DATA_HOME:-$HOME/.local/share}/zinit/zinit.git/zinit.zsh\" && zinit self-update && zinit update --all'"

[brew]
greedy_cask = true
greedy_latest = true
greedy_auto_updates = true
autoremove = true

[git]
repos = ["~/projects/*/"]

[firmware]
upgrade = true
