# Mirrors the previous Oh My Posh "zen" prompt, with styling borrowed from the Pure preset.
add_newline = true
continuation_prompt = "[вқҜвқҜ ](subtle)"
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$python \
$character"""

right_format = "$cmd_duration"
palette = "tokyo_night"

[palettes.tokyo_night]
bg = "#1a1b26"
comment = "#565f89"
subtle = "#737aa2"
fg = "#c0caf5"
red = "#f7768e"
yellow = "#e0af68"
cyan = "#7dcfff"
pink = "#ffafd7"

[directory]
format = "[$path]($style)"
style = "cyan"
truncation_length = 0
truncate_to_repo = false

[git_branch]
symbol = "пҗҳ"
format = " [$symbol $branch]($style)"
style = "fg"

[git_state]
format = ' \([$state( $progress_current/$progress_total)]($style)\)'
style = "comment"

[git_status]
format = " [[(*$conflicted$untracked$modified$staged$renamed$deleted)](pink)( $ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "вҖӢ"
untracked = "вҖӢ"
modified = "вҖӢ"
staged = "вҖӢ"
renamed = "вҖӢ"
deleted = "вҖӢ"
stashed = "вүЎ"
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮЈвҮЎ"

[python]
symbol = "оҳҶ"
detect_extensions = []
detect_files = []
detect_env_vars = ["VIRTUAL_ENV"]
format = "[$symbol Py]($style)"
style = "yellow"

[cmd_duration]
format = "[ пҗә $duration]($style)"
min_time = 5000
style = "yellow"

[character]
error_symbol = "[вқҜ](red)"
success_symbol = "[вқҜ](subtle)"
