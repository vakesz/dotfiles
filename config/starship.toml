add_newline = true
continuation_prompt = "[❯❯ ](subtle)"
format = """
$directory\
$git_status\
$git_branch\
$git_state\
$c\
$swift\
$nodejs\
$python \
$character"""

right_format = "$cmd_duration"
palette = "tokyo_night"

[palettes.tokyo_night]
bg = "#1a1b26"
comment = "#565f89"
subtle = "#737aa2"
fg = "#c0caf5"
red = "#f7768e"
yellow = "#e0af68"
cyan = "#7dcfff"
pink = "#ffafd7"

[directory]
format = "[$path]($style)"
style = "cyan"
truncation_length = 0
truncate_to_repo = false

[git_branch]
format = " [$branch]($style)"
style = "fg"

[git_state]
format = ' \([$state( $progress_current/$progress_total)]($style)\)'
style = "comment"

[git_status]
format = " [](fg)[($modified)](pink)[($ahead_behind$stashed)]($style)"
style = "cyan"
modified = "*"
stashed = "≡"
ahead = "⇡"
behind = "⇣"
diverged = "⇣⇡"

[c]
symbol = ""
detect_extensions = ["c", "h"]
detect_files = ["Makefile", "compile_commands.json", "CMakeLists.txt"]
detect_folders = ["src"]
format = " [$symbol]($style)"
style = "cyan"

[swift]
symbol = ""
detect_extensions = ["swift"]
detect_files = ["Package.swift", "project.yml"]
detect_folders = ["Sources", "App"]
format = " [$symbol]($style)"
style = "pink"

[nodejs]
symbol = ""
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = []
format = " [$symbol]($style)"
style = "yellow"

[python]
symbol = ""
detect_extensions = []
detect_files = []
detect_env_vars = ["VIRTUAL_ENV"]
format = " [$symbol]($style)"
style = "yellow"

[cmd_duration]
format = "[  $duration]($style)"
min_time = 5000
style = "yellow"

[character]
error_symbol = "[❯](red)"
success_symbol = "[❯](subtle)"
